name: Apple Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: apple-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iPhone and Watch apps
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show build settings
        run: |
          xcodebuild -version
          xcodebuild -list -project SimplyVitals.xcodeproj

      - name: Build iOS companion app
        run: |
          set -o pipefail
          xcodebuild \
            -project SimplyVitals.xcodeproj \
            -scheme SimplyVitals \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build watchOS app
        run: |
          set -o pipefail
          xcodebuild \
            -project SimplyVitals.xcodeproj \
            -scheme "SimplyVitals Watch App" \
            -destination 'generic/platform=watchOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
