name: SimplyVitals
options:
  bundleIdPrefix: com.simplyvitals
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  SimplyVitals:
    type: application
    platform: iOS
    sources:
      - Shared
      - iOS
    info:
      path: iOS/Info.plist
    entitlements:
      path: iOS/SimplyVitals.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simplyvitals.app
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    dependencies:
      - target: SimplyVitals Watch App
  SimplyVitals Watch App:
    type: application
    platform: watchOS
    sources:
      - Shared
      - Watch
    info:
      path: Watch/Info.plist
    entitlements:
      path: Watch/SimplyVitalsWatch.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simplyvitals.app.watchkitapp
        INFOPLIST_KEY_WKApplication: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
